<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loztvayne | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Nowoczesna, głęboka paleta kolorów */
            --bg-base: #030305;
            --bg-surface: rgba(18, 20, 38, 0.65);
            --blue-dark: #0a0f24;
            --blue-accent: #2563eb;
            --blue-glow: rgba(37, 99, 235, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
            
            /* Płynne przejścia */
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* Efekt "spotlight" w tle */
            background-image: radial-gradient(circle at 50% 0%, #111836 0%, transparent 50%);
        }

        /* --- NAWIGACJA (Glassmorphism 2.0) --- */
        nav {
            position: fixed;

            top: 0;
            width: 100%;
            background: var(--bg-surface);
            padding: 1.25rem 2rem;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            z-index: 100;
            animation: slideDown 0.8s ease-out forwards;
        }

        nav h2 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* --- SEKCJA GŁÓWNA --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8rem 2rem 4rem;
            text-align: center;
            z-index: 10;
        }

        /* Typografia z efektem gradientu (Apple/Stripe style) */
        h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            margin: 1.5rem 0;
            letter-spacing: -1px;
            line-height: 1.1;
            background: linear-gradient(to top, #ffffff 0%, #718096 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease-out 0.2s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        #id2h2 {
            font-weight: 500;
            color: var(--blue-accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        #id1h2 {
    font-weight: 300;
    color: var(--text-secondary);
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    width: 100%; /* Wymusza zajęcie całej szerokości nawigacji */
    /* Usunięto max-width: 600px; */
    animation: fadeInUp 1s ease-out 0.4s forwards;
    opacity: 0;
    transform: translateY(20px);
}

        /* --- BOX Z GUZIKIEM --- */
        .btn-container {
            margin-top: 4rem;
            width: 100%;
            display: flex;
            justify-content: center;
            animation: fadeInUp 1s ease-out 0.6s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Zaawansowany guzik z poświatą */
/* ZAKTUALIZOWANA KLASA PRZYCISKU */
.action-btn {
    position: relative;
    width: 30%; 
    min-width: 250px;
    height: 192px; /* Sztywna wysokość jest kluczowa dla tego efektu */
    padding: 0; /* Usuwamy padding, wysokość kontroluje flexbox */
    background: rgba(10, 15, 36, 0.8);
    color: var(--text-primary);
    border: 1px solid rgba(37, 99, 235, 0.3);
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    transition: var(--transition-smooth);
    overflow: hidden; /* Magia - ukrywa tekst, który jest poza przyciskiem */
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    margin: 10px;
}

/* KONTENER SCROLLERA */
.text-scroller {
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* POJEDYNCZE SŁOWO */
.text-scroller span {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 192px; /* Musi idealnie odpowiadać wysokości przycisku */
    min-height: 192px;
    font-weight: 500;
    font-size: 1.1rem;
    letter-spacing: 1px;
}

/* ODPALANIE ANIMACJI TYLKO NA HOVER */
.action-btn:hover .text-scroller {
    /* 4.5s całkowitego czasu, nieliniowe tempo (szybki przeskok, długa pauza) */
    animation: textSlide 3s cubic-bezier(0.8, 0, 0.2, 1) infinite;
}

/* KEYFRAMES - KLUCZ DO EFEKTU */
@keyframes textSlide {
    0%, 20% { transform: translateY(0); }             /* Pokazuje: Frameworks */
    33%, 53% { transform: translateY(-192px); }        /* Pokazuje: Systems */
    66%, 86% { transform: translateY(-384px); }       /* Pokazuje: Scripts */
    100% { transform: translateY(-576px); }           /* Wraca do: Frameworks (Klon) i pętla się restartuje niepostrzeżenie */
}

/* ZACHOWAJ POPRZEDNIE EFEKTY HOVER DLA TŁA I CIENI (Dodaj je pod spodem) */
.action-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(45deg, var(--blue-accent), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
}

.action-btn:hover {
    border-color: var(--blue-accent);
    box-shadow: 0 10px 40px var(--blue-glow), 
                inset 0 0 20px rgba(37, 99, 235, 0.2);
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
}

.action-btn:hover::before {
    opacity: 0.1;
}

        
        /* Efekt świecącego tła przy najechaniu */
        .action-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, var(--blue-accent), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .action-btn:hover {
            transform: translateY(-4px);
            border-color: var(--blue-accent);
            box-shadow: 0 10px 40px var(--blue-glow), 
                        inset 0 0 20px rgba(37, 99, 235, 0.2);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .action-btn:hover::before {
            opacity: 0.1;
        }

        .action-btn:active {
            transform: translateY(1px);
            box-shadow: 0 5px 20px var(--blue-glow);
        }

        /* --- STOPKA --- */
        footer {
            padding: 2rem;
            text-align: center;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-glass);
            animation: fadeIn 1.5s ease-out 1s forwards;
            opacity: 0;
        }

        /* --- ANIMACJE (Keyframes) --- */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- RESPONSYWNOŚĆ --- */
        @media (max-width: 1024px) {
            .action-btn { width: 45%; }
        }

        @media (max-width: 768px) {
            .action-btn { width: 85%; }
            main { padding-top: 6rem; }
        }
    </style>
</head>
<body>

    <nav>
        <h2 id="id1h2">Home</h2>
    </nav>

    <main>
        <h2 id="id2h2">Im Loztvayne,</h2>
        <h1>I translate YOUR IDEAS into Lua</h1>

        <div class="btn-container">
            <a href="uis.html" class="action-btn">UIs</a>
            <a href="scripts.html" class="action-btn">
                <div class="text-scroller">
                    <span>Frameworks</span>
                    <span>Systems</span>
                    <span>Scripts</span>
                    <span>Frameworks</span> 
                </div>
            </a>
            <a href="thumbnails.html" class="action-btn">Thumbnails</a>
            
        </div>
    </main>

    <footer>
        &copy; 2026 Loztvayne | All Rights Reserved
    </footer>

</body>
</html>
